---
# Molecule preparation playbook
# Sets up the test container before running the llamaindex role

- name: Prepare
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Wait for container to be ready
      ansible.builtin.wait_for_connection:
        timeout: 30

    - name: Gather facts
      ansible.builtin.setup:

    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install base packages for LlamaIndex role
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - procps
          - systemd
          - zstd
        state: present
      when: ansible_facts['os_family'] == 'Debian'
