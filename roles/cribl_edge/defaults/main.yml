---
# Cribl Edge native installation defaults

# Installation
cribl_edge_version: "latest"
cribl_edge_tarball_url: "https://cdn.cribl.io/dl/{{ cribl_edge_version }}/cribl-{{ cribl_edge_version }}-linux-x64.tgz"
cribl_edge_install_dir: /opt/cribl

# Service user
cribl_edge_user: cribl
cribl_edge_group: cribl

# Systemd service
cribl_edge_service_name: cribl

# Syslog ports from terraform constants (no hardcoded values)
cribl_edge_syslog_ports: >-
  {{ hostvars['localhost']['terraform_data']['constants']['syslog_ports'].values() | list }}

# Syslog port mappings with names (for input/pipeline config)
cribl_edge_syslog_port_mappings: >-
  {{ hostvars['localhost']['terraform_data']['constants']['syslog_ports'] }}

# Splunk HEC configuration - derived from inventory
cribl_edge_splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
cribl_edge_hec_url: "https://{{ cribl_edge_splunk_host }}:8088"
cribl_edge_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"
