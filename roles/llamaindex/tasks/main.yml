---
# LlamaIndex RAG Engine Deployment Tasks
# Deploys Ollama (CPU-only embeddings) + LlamaIndex orchestration

# =============================================================================
# System Dependencies
# =============================================================================

- name: Install Python and build dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

# =============================================================================
# Ollama Installation
# =============================================================================

- name: Download Ollama install script
  ansible.builtin.get_url:
    url: https://ollama.com/install.sh
    dest: /tmp/ollama-install.sh
    mode: "0755"

- name: Install Ollama
  ansible.builtin.command:
    cmd: /tmp/ollama-install.sh
    creates: /usr/local/bin/ollama

- name: Enable and start Ollama systemd service
  ansible.builtin.systemd:
    name: ollama
    state: started
    enabled: true
    daemon_reload: true

- name: Pull embedding model
  ansible.builtin.command:
    cmd: "ollama pull {{ llamaindex_ollama_model }}"
  register: llamaindex_ollama_pull
  changed_when: "'pulling' in llamaindex_ollama_pull.stdout"

# =============================================================================
# LlamaIndex Application Directory
# =============================================================================

- name: Create LlamaIndex data directory
  ansible.builtin.file:
    path: "{{ llamaindex_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: "python3 -m venv {{ llamaindex_data_dir }}/venv"
    creates: "{{ llamaindex_data_dir }}/venv/bin/python"

- name: Install LlamaIndex packages in virtual environment
  ansible.builtin.pip:
    name:
      - llama-index-core
      - llama-index-vector-stores-qdrant
      - llama-index-embeddings-ollama
    state: present
    virtualenv: "{{ llamaindex_data_dir }}/venv"

# =============================================================================
# Configuration
# =============================================================================

- name: Deploy LlamaIndex configuration
  ansible.builtin.template:
    src: llamaindex-config.yaml.j2
    dest: "{{ llamaindex_data_dir }}/config.yaml"
    owner: root
    group: root
    mode: "0640"

# =============================================================================
# Health Checks
# =============================================================================

- name: Verify Ollama service is running
  ansible.builtin.systemd:
    name: ollama
  register: llamaindex_ollama_service
  failed_when: llamaindex_ollama_service.status.ActiveState != 'active'

- name: Verify embedding model is loaded
  ansible.builtin.command:
    cmd: "ollama list"
  register: llamaindex_model_check
  changed_when: false
  failed_when: "llamaindex_ollama_model not in llamaindex_model_check.stdout"
