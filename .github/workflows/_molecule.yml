---
name: Molecule

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Molecule (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [default, qdrant, llamaindex]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Molecule and dependencies
        run: |
          uv pip install --system \
            molecule \
            'molecule-plugins[docker]>=23.0.0' \
            'ansible-core>=2.16' \
            'docker>=7.0.0' \
            ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Run molecule tests
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          MOLECULE_SCENARIO: ${{ matrix.scenario }}
        run: molecule test -s "$MOLECULE_SCENARIO"

  template-render:
    name: Template Rendering Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Ansible and dependencies
        run: |
          uv pip install --system \
            'ansible-core>=2.16'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Run template rendering tests
        run: ansible-playbook tests/template_render/verify_templates.yml -c local
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
